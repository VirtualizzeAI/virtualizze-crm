services:
  backend:
    build:
      context: ./backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - '3333:3333'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - path: ./frontend/.env
        required: false
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules